# Google App Engine configuration
runtime: python311

# Entry point
entrypoint: gunicorn -b :$PORT app:app

env_variables:
  FLASK_ENV: production
  # IMPORTANT: Set these via Google Cloud Secret Manager or environment config.
  # DO NOT hardcode real credentials in this file.
  DATABASE_URL: "SET_VIA_ENVIRONMENT"
  SECRET_KEY: "SET_VIA_ENVIRONMENT"
  GOOGLE_OAUTH_CLIENT_ID: "SET_VIA_ENVIRONMENT"
  GOOGLE_OAUTH_CLIENT_SECRET: "SET_VIA_ENVIRONMENT"

# Handlers for static files
handlers:
  - url: /static
    static_dir: static
    secure: always

  - url: /.*
    script: auto
    secure: always

automatic_scaling:
  min_instances: 0
  max_instances: 10
  target_cpu_utilization: 0.65

resources:
  cpu: 1
  memory_gb: 0.5
  disk_size_gb: 10